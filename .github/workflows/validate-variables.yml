name: Validate variables.json

on:
  pull_request:
    paths:
      - 'variables.json'
      - 'variables.schema.json'
      - '.github/workflows/validate-variables.yml'
  push:
    branches: [main]
    paths:
      - 'variables.json'

jobs:
  validate:
    name: Schema validation + sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate against schema
        run: |
          ajv validate \
            -s variables.schema.json \
            -d variables.json \
            -c ajv-formats

      - name: Sanity checks
        run: |
          node -e "
            const v = require('./variables.json');
            const errors = [];
            if (v.tax.rate < 0 || v.tax.rate > 0.5) errors.push('tax.rate が異常: ' + v.tax.rate);
            if (v.onboarding.multiplierMonths < 0 || v.onboarding.multiplierMonths > 12)
              errors.push('onboarding.multiplierMonths が異常: ' + v.onboarding.multiplierMonths);
            const ids = new Set();
            for (const p of v.plans) {
              if (ids.has(p.id)) errors.push('plan id 重複: ' + p.id);
              ids.add(p.id);
              if (p.monthly < 0) errors.push('plan ' + p.id + ' monthly が負');
            }
            const dmIds = new Set();
            for (const d of v.dmPlans) {
              if (dmIds.has(d.id)) errors.push('dmPlan id 重複: ' + d.id);
              dmIds.add(d.id);
            }
            if (errors.length) { console.error(errors.join('\n')); process.exit(1); }
            console.log('OK: ' + v.plans.length + ' plans, ' + v.dmPlans.length + ' dmPlans, ' + v.reps.length + ' reps');
          "

  notify:
    name: Notify version bump
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect version change
        run: |
          PREV=$(git show HEAD~1:variables.json 2>/dev/null | node -e "
            let s=''; process.stdin.on('data',c=>s+=c).on('end',()=>{
              try { console.log(JSON.parse(s).version); } catch(e) { console.log('?'); }
            });
          ")
          CURR=$(node -e "console.log(require('./variables.json').version)")
          echo "Previous: $PREV / Current: $CURR"
          if [ "$PREV" != "$CURR" ]; then
            echo "::notice::variables.json version $PREV → $CURR"
          fi
